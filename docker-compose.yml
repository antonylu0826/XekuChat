# XekuChat — Development Environment
# Usage: docker compose up -d

services:
  # ---- PostgreSQL + pgroonga ----
  postgres:
    image: groonga/pgroonga:latest-alpine-17-slim
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xekuchat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xekuchat_dev}
      POSTGRES_DB: ${POSTGRES_DB:-xekuchat}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xekuchat}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- MinIO (S3-compatible file storage) ----
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-xekuchat}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-xekuchat_dev}
    ports:
      - "9000:9000"
      - "9001:9001"   # MinIO Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- Keycloak (OIDC Provider) ----
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER:-xekuchat}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-xekuchat_dev}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
  redis_data:
  minio_data:
